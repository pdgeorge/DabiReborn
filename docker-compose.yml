services:
  dabi-stream-brain:
    build:
      context: .
      dockerfile: dabi-stream-brain/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://overlay:strongpassword@rabbitmq:5672/
    networks:
      - twitchbroadcaster_net
    volumes:
      - ./dabi-stream-brain:/app
      - ./shared:/app/shared

  dabi-discord:
    build:
      context: .
      dockerfile: dabi-stream-brain/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://overlay:strongpassword@rabbitmq:5672/
    networks:
      - twitchbroadcaster_net
    volumes:
      - ./dabi-stream-brain:/app
      - ./shared:/app/shared
    command: python discord_bot.py

  dabi-chatroom-brain:
    build:
      context: .
      dockerfile: dabi-chatroom-brain/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://overlay:strongpassword@rabbitmq:5672/
      LLM_BACKEND: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: gemma4:e2b
    networks:
      - twitchbroadcaster_net
      - dabidotcom_net
    volumes:
      - ./dabi-chatroom-brain:/app
      - ./shared:/app/shared

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - twitchbroadcaster_net
      - dabidotcom_net

volumes:
  ollama_data:


networks:
  twitchbroadcaster_net:
    external: true
  dabidotcom_net:
    external: true
