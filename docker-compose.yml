services:
  dabi-stream-brain:
    build: ./dabi-stream-brain
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://overlay:strongpassword@rabbitmq:5672/
    networks:
      - twitchbroadcaster_net

  dabi-chatroom-brain:
    build: ./dabi-chatroom-brain
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://overlay:strongpassword@rabbitmq:5672/
    networks:
      - twitchbroadcaster_net

networks:
  twitchbroadcaster_net:
    external: true